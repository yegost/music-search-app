<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Music Search</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <button id="btn-artist" class="nav-btn">
                <img class="btn-img" src="/images/backicon.png" alt="back button" />
            </button>
            <div class="search-header">
                <div class="search-wrapper">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Who would you like to search...">
                    </div>
                    <div id="results"></div>
                </div>
            </div>
            <button id="btn-back" class="nav-btn">
                <img class="btn-img" src="/images/homeicon.png" alt="home button" />
            </button>
        </header>
        <main>
            <div class="container">
                <div class="container-inner">
                    <section id="home-page">
                        <h1>Search for an artist</h1>
                    </section>
                    <section id="artist-page" class="hidden">
                        <div id="artist-header"></div>
                        <hr>
                        <div id="albums-section"></div>
                    </section>
                    <section id="album-page" class="hidden">
                        <div id="album-header"></div>
                        <hr>
                        <div id="tracks-list"></div>
                    </section>
                </div>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
