<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Music Search</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <div class="search-header">
                <div class="search-wrapper">
                    <h3 id="header-text">Search for an artist</h3>
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Who would you like to search...">
                    </div>
                    <div id="results"></div>
                </div>
            </div>
        </header>
        <main class="hidden">
            <div class="container">
                <div class="container-inner">
                    <div id="artist-page" class="hidden">
                        <div id="artist-header"></div>
                        <hr>
                        <div id="albums-section"></div>
                    </div>

                    <div id="album-page" class="hidden">
                        <div id="album-header"></div>
                        <hr>
                        <div id="tracks-list"></div>
                    </div>
                </div>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
